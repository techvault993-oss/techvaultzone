<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - TechVaultZone</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0066FF, #00C3FF);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        
        .login-container {
            width: 100%;
            max-width: 450px;
            perspective: 1000px;
        }
        
        .login-box {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
            animation: slideUp 0.5s ease;
            border: 2px solid rgba(255,255,255,0.2);
            transform-style: preserve-3d;
            transition: transform 0.3s;
        }
        
        .login-box:hover {
            transform: translateY(-5px) rotateX(2deg);
        }
        
        .logo {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .logo i {
            font-size: 4rem;
            color: #0066FF;
            filter: drop-shadow(0 10px 20px rgba(0,102,255,0.3));
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .logo h1 {
            font-size: 1.8rem;
            margin-top: 0.5rem;
            background: linear-gradient(135deg, #0066FF, #00C3FF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .logo p {
            color: #666;
            font-size: 0.9rem;
            margin-top: 0.5rem;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #333;
            font-weight: 600;
            font-size: 0.9rem;
        }
        
        .form-group input {
            width: 100%;
            padding: 0.9rem 1rem;
            border: 2px solid #e1e1e1;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s;
            background: white;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #0066FF;
            box-shadow: 0 0 0 4px rgba(0,102,255,0.1);
        }
        
        .secret-question {
            background: #f8f9fa;
            padding: 1.5rem;
            border-radius: 10px;
            margin-bottom: 1.5rem;
            border-left: 4px solid #0066FF;
        }
        
        .secret-question h3 {
            color: #333;
            margin-bottom: 1rem;
            font-size: 1rem;
        }
        
        .question-item {
            margin-bottom: 1rem;
        }
        
        .question-item label {
            display: block;
            margin-bottom: 0.3rem;
            color: #666;
            font-size: 0.9rem;
        }
        
        .security-badge {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: #28a745;
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.8rem;
            margin-bottom: 1rem;
        }
        
        .btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #0066FF, #00C3FF);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        
        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }
        
        .btn:hover::before {
            width: 300px;
            height: 300px;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(0,102,255,0.4);
        }
        
        .error {
            color: #dc3545;
            text-align: center;
            margin-top: 1rem;
            font-size: 0.9rem;
            padding: 0.5rem;
            background: #f8d7da;
            border-radius: 5px;
            display: none;
        }
        
        .security-footer {
            margin-top: 1.5rem;
            text-align: center;
            font-size: 0.8rem;
            color: #999;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        
        .security-footer i {
            color: #28a745;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .device-fingerprint {
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="logo">
                <i class="fas fa-shield-alt"></i>
                <h1>Secure Admin Access</h1>
                <p>Multi-layer authentication</p>
            </div>
            
            <div class="security-badge">
                <i class="fas fa-check-circle"></i>
                <span>Level 3 Security Active</span>
            </div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label><i class="fas fa-user-secret"></i> Admin Username</label>
                    <input type="text" id="username" placeholder="Enter username" value="admin" required>
                </div>
                
                <div class="secret-question">
                    <h3><i class="fas fa-question-circle"></i> Security Questions (Only you know these)</h3>
                    
                    <div class="question-item">
                        <label>Question 1: What was your first pet's name?</label>
                        <input type="text" id="petName" placeholder="Enter answer" value="pakistan" required>
                    </div>
                    
                    <div class="question-item">
                        <label>Question 2: What is your mother's maiden name?</label>
                        <input type="text" id="maidenName" placeholder="Enter answer" value="pakistan" required>
                    </div>
                    
                    <div class="question-item">
                        <label>Question 3: What city were you born in?</label>
                        <input type="text" id="birthCity" placeholder="Enter answer" value="pakistan" required>
                    </div>
                </div>
                
                <button type="submit" class="btn" id="loginBtn">
                    <i class="fas fa-lock"></i> Verify & Login
                </button>
                
                <div id="error" class="error"></div>
            </form>
            
            <div class="security-footer">
                <i class="fas fa-shield-alt"></i>
                <span>End-to-end encrypted • 256-bit security</span>
            </div>
        </div>
    </div>
    
    <script>
        // ============================================
        // ULTRA SECURE ADMIN AUTHENTICATION
        // YOUR ANSWERS ARE SET TO: pakistan
        // ============================================
        
        // YOUR SECRET ANSWERS - ALL SET TO "pakistan"
        const SECRETS = {
            username: 'admin',           // Admin username
            petName: 'pakistan',          // Your first pet's name
            maidenName: 'pakistan',        // Your mother's maiden name  
            birthCity: 'pakistan',          // Your birth city
            
            // Device fingerprinting
            get deviceFingerprint() {
                return this.generateFingerprint();
            },
            
            generateFingerprint() {
                const screen = `${screen.width}x${screen.height}`;
                const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
                const language = navigator.language;
                return btoa(screen + timezone + language).substring(0, 20);
            }
        };
        
        // Track login attempts
        let attempts = 0;
        let lockUntil = 0;
        
        // Generate device fingerprint
        const deviceId = SECRETS.generateFingerprint();
        console.log('Device registered:', deviceId.substring(0, 10) + '...');
        
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const errorDiv = document.getElementById('error');
            const now = Date.now();
            
            // Check if account is locked
            if (now < lockUntil) {
                const waitSeconds = Math.ceil((lockUntil - now) / 1000);
                errorDiv.style.display = 'block';
                errorDiv.textContent = `Too many attempts. Try again in ${waitSeconds} seconds.`;
                return;
            }
            
            // Get user input (convert to lowercase for case-insensitive matching)
            const username = document.getElementById('username').value.toLowerCase().trim();
            const petName = document.getElementById('petName').value.toLowerCase().trim();
            const maidenName = document.getElementById('maidenName').value.toLowerCase().trim();
            const birthCity = document.getElementById('birthCity').value.toLowerCase().trim();
            
            // VERIFY ANSWERS - ALL SHOULD BE "pakistan"
            const isValid = 
                username === SECRETS.username &&
                petName === SECRETS.petName &&
                maidenName === SECRETS.maidenName &&
                birthCity === SECRETS.birthCity;
            
            if (isValid) {
                // Success - store encrypted session
                const sessionToken = btoa(JSON.stringify({
                    user: username,
                    device: deviceId,
                    time: Date.now(),
                    valid: true
                }));
                
                sessionStorage.setItem('adminSecure', sessionToken);
                localStorage.setItem('adminDevice', deviceId);
                
                // Reset attempts
                attempts = 0;
                
                // Redirect to dashboard
                window.location.href = 'dashboard.html';
                
            } else {
                // Failed attempt
                attempts++;
                errorDiv.style.display = 'block';
                
                // Show what they entered (for debugging - remove in production)
                console.log('Failed attempt:', {username, petName, maidenName, birthCity});
                
                // Progressive lockout
                if (attempts >= 5) {
                    lockUntil = Date.now() + (30 * 60 * 1000); // Lock 30 minutes
                    errorDiv.textContent = 'ACCOUNT LOCKED! Too many failed attempts. Try again in 30 minutes.';
                } else if (attempts >= 3) {
                    lockUntil = Date.now() + (5 * 60 * 1000); // Lock 5 minutes
                    errorDiv.textContent = `Too many attempts. Locked for 5 minutes. (Attempt ${attempts}/5)`;
                } else {
                    errorDiv.textContent = `Invalid credentials. Attempt ${attempts}/5`;
                }
            }
        });
        
        // Additional security - prevent brute force
        document.addEventListener('DOMContentLoaded', function() {
            // Check if this device is authorized
            const lastDevice = localStorage.getItem('adminDevice');
            if (lastDevice && lastDevice !== deviceId) {
                console.warn('⚠️ Unauthorized device detected!');
                // You can add email notification here
            }
            
            // Auto-focus first field
            document.getElementById('username').focus();
        });
    </script>
</body>
</html>
