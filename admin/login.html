<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - TechVaultZone</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0A0A0A, #0066FF);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        
        .login-container {
            width: 100%;
            max-width: 450px;
        }
        
        .login-box {
            background: white;
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: slideUp 0.5s ease;
        }
        
        .logo {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .logo i {
            font-size: 3rem;
            color: #0066FF;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .logo h1 {
            font-size: 1.5rem;
            margin-top: 0.5rem;
            color: #333;
        }
        
        .step {
            display: none;
        }
        
        .step.active {
            display: block;
            animation: fadeIn 0.5s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        
        .step-indicator {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 2rem;
        }
        
        .step-dot {
            width: 10px;
            height: 10px;
            background: #ddd;
            border-radius: 50%;
            transition: all 0.3s;
        }
        
        .step-dot.active {
            background: #0066FF;
            transform: scale(1.3);
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #555;
            font-weight: 500;
        }
        
        .form-group input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 2px solid #e1e1e1;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #0066FF;
            box-shadow: 0 0 0 3px rgba(0,102,255,0.1);
        }
        
        .btn {
            width: 100%;
            padding: 0.875rem;
            background: linear-gradient(135deg, #0066FF, #00C3FF);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 1rem;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,102,255,0.3);
        }
        
        .btn-secondary {
            background: #6c757d;
            margin-top: 0.5rem;
        }
        
        .error {
            color: #dc3545;
            text-align: center;
            margin-top: 1rem;
            font-size: 0.875rem;
            padding: 0.5rem;
            background: #f8d7da;
            border-radius: 5px;
            display: none;
        }
        
        .error.show {
            display: block;
        }
        
        .attempts {
            text-align: center;
            margin-top: 1rem;
            font-size: 0.75rem;
            color: #999;
        }
        
        .warning {
            color: #856404;
            background: #fff3cd;
            padding: 0.75rem;
            border-radius: 5px;
            margin-bottom: 1rem;
            font-size: 0.875rem;
            text-align: center;
        }
        
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="logo">
                <i class="fas fa-shield-alt"></i>
                <h1>TechVaultZone Admin</h1>
                <p>Secure Access Portal</p>
            </div>
            
            <div class="step-indicator">
                <div class="step-dot active" id="step1Dot"></div>
                <div class="step-dot" id="step2Dot"></div>
                <div class="step-dot" id="step3Dot"></div>
                <div class="step-dot" id="step4Dot"></div>
            </div>
            
            <!-- STEP 1: Username & Password -->
            <div class="step active" id="step1">
                <div class="warning">
                    <i class="fas fa-lock"></i> Authorized Personnel Only
                </div>
                
                <form id="step1Form">
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" placeholder="Enter username" autofocus>
                    </div>
                    
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" placeholder="Enter password">
                    </div>
                    
                    <button type="submit" class="btn">Continue <i class="fas fa-arrow-right"></i></button>
                </form>
            </div>
            
            <!-- STEP 2: Security Question 1 -->
            <div class="step" id="step2">
                <div class="form-group">
                    <label>Question 1: What is your favorite city?</label>
                    <input type="text" id="answer1" placeholder="Your answer">
                </div>
                
                <button class="btn" onclick="checkAnswer1()">Continue <i class="fas fa-arrow-right"></i></button>
                <button class="btn btn-secondary" onclick="goToStep(1)"><i class="fas fa-arrow-left"></i> Back</button>
            </div>
            
            <!-- STEP 3: Security Question 2 -->
            <div class="step" id="step3">
                <div class="form-group">
                    <label>Question 2: What is your favorite food?</label>
                    <input type="text" id="answer2" placeholder="Your answer">
                </div>
                
                <button class="btn" onclick="checkAnswer2()">Continue <i class="fas fa-arrow-right"></i></button>
                <button class="btn btn-secondary" onclick="goToStep(2)"><i class="fas fa-arrow-left"></i> Back</button>
            </div>
            
            <!-- STEP 4: Security Question 3 -->
            <div class="step" id="step4">
                <div class="form-group">
                    <label>Question 3: What is your favorite hobby?</label>
                    <input type="text" id="answer3" placeholder="Your answer">
                </div>
                
                <button class="btn" onclick="checkAnswer3()">Login <i class="fas fa-sign-in-alt"></i></button>
                <button class="btn btn-secondary" onclick="goToStep(3)"><i class="fas fa-arrow-left"></i> Back</button>
            </div>
            
            <div class="error" id="errorMessage"></div>
            <div class="attempts" id="attemptCount">Attempts remaining: 5</div>
        </div>
    </div>

    <script>
        // ============================================
        // ULTRA SECURE ADMIN LOGIN
        // ALL ANSWERS = "pakistan" (YOU MUST REMEMBER)
        // ============================================
        
        const SECRETS = {
            username: 'admin',
            password: 'pakistan',
            answer1: 'pakistan',
            answer2: 'pakistan', 
            answer3: 'pakistan'
        };
        
        let currentStep = 1;
        let attempts = 5;
        let lockedUntil = null;
        
        function isLocked() {
            if (lockedUntil && new Date() < lockedUntil) {
                const waitTime = Math.ceil((lockedUntil - new Date()) / 1000);
                showError(`Too many attempts. Locked for ${waitTime} seconds.`);
                return true;
            }
            return false;
        }
        
        function failedAttempt() {
            attempts--;
            document.getElementById('attemptCount').textContent = `Attempts remaining: ${attempts}`;
            
            if (attempts <= 0) {
                lockedUntil = new Date(Date.now() + 15 * 60 * 1000);
                showError('Too many failed attempts. Locked for 15 minutes.');
                disableAllInputs();
            }
        }
        
        function resetAttempts() {
            attempts = 5;
            lockedUntil = null;
            document.getElementById('attemptCount').textContent = `Attempts remaining: ${attempts}`;
        }
        
        function showError(message) {
            const errorEl = document.getElementById('errorMessage');
            errorEl.textContent = message;
            errorEl.classList.add('show');
            
            setTimeout(() => {
                errorEl.classList.remove('show');
            }, 3000);
        }
        
        function goToStep(step) {
            if (isLocked()) return;
            
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            document.getElementById(`step${step}`).classList.add('active');
            
            document.querySelectorAll('.step-dot').forEach((dot, index) => {
                dot.classList.toggle('active', index < step);
            });
            
            currentStep = step;
        }
        
        document.getElementById('step1Form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            if (isLocked()) return;
            
            const username = document.getElementById('username').value.toLowerCase().trim();
            const password = document.getElementById('password').value.toLowerCase().trim();
            
            if (username === SECRETS.username && password === SECRETS.password) {
                goToStep(2);
            } else {
                failedAttempt();
                showError('Invalid username or password');
            }
        });
        
        function checkAnswer1() {
            if (isLocked()) return;
            
            const answer = document.getElementById('answer1').value.toLowerCase().trim();
            
            if (answer === SECRETS.answer1) {
                goToStep(3);
            } else {
                failedAttempt();
                showError('Incorrect answer');
            }
        }
        
        function checkAnswer2() {
            if (isLocked()) return;
            
            const answer = document.getElementById('answer2').value.toLowerCase().trim();
            
            if (answer === SECRETS.answer2) {
                goToStep(4);
            } else {
                failedAttempt();
                showError('Incorrect answer');
            }
        }
        
        function checkAnswer3() {
            if (isLocked()) return;
            
            const answer = document.getElementById('answer3').value.toLowerCase().trim();
            
            if (answer === SECRETS.answer3) {
                resetAttempts();
                
                const sessionToken = btoa(Date.now() + 'admin' + Math.random());
                sessionStorage.setItem('adminToken', sessionToken);
                sessionStorage.setItem('adminLoginTime', Date.now());
                
                window.location.href = 'index.html';
            } else {
                failedAttempt();
                showError('Incorrect answer');
            }
        }
        
        function disableAllInputs() {
            document.querySelectorAll('input, button').forEach(el => {
                el.disabled = true;
            });
        }
        
        if (sessionStorage.getItem('adminToken')) {
            const loginTime = sessionStorage.getItem('adminLoginTime');
            if (loginTime && (Date.now() - loginTime < 30 * 60 * 1000)) {
                window.location.href = 'index.html';
            } else {
                sessionStorage.removeItem('adminToken');
                sessionStorage.removeItem('adminLoginTime');
            }
        }
    </script>
</body>
</html>
